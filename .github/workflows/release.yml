name: Build and Release

on:
  push:
    tags:
      - "v*.*.*" # Se activa con tags como v1.0.0, v1.2.3, etc.
  workflow_dispatch: # Permite ejecutar manualmente

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: ExcelAnalyzer
            asset_name: ExcelAnalyzer-linux-x64
          - os: windows-latest
            artifact_name: ExcelAnalyzer.exe
            asset_name: ExcelAnalyzer-windows-x64.exe
          - os: macos-latest
            artifact_name: ExcelAnalyzer
            asset_name: ExcelAnalyzer-macos-x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller excel_analyzer.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Display structure of downloaded files
        run: ls -R ./artifacts

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./artifacts/ExcelAnalyzer-linux-x64/ExcelAnalyzer
            ./artifacts/ExcelAnalyzer-windows-x64.exe/ExcelAnalyzer.exe
            ./artifacts/ExcelAnalyzer-macos-x64/ExcelAnalyzer
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## 🎉 Excel Analyzer ${{ github.ref_name }}

            Analizador y comparador de archivos Excel con interfaz web.

            ### 📥 Descargas por plataforma:

            - **Windows**: `ExcelAnalyzer-windows-x64.exe`
            - **Linux**: `ExcelAnalyzer-linux-x64`
            - **macOS**: `ExcelAnalyzer-macos-x64`

            ### ✨ Características:
            - Análisis individual de archivos Excel
            - Comparación de 2 archivos
            - Detección de diferencias
            - Interfaz web intuitiva
            - Optimizado para archivos grandes

            ### 🚀 Uso:
            1. Descarga el ejecutable para tu sistema operativo
            2. Ejecuta el archivo
            3. Abre tu navegador en `http://localhost:5000`

            ### 📝 Notas:
            - En Linux/macOS, necesitas dar permisos de ejecución: `chmod +x ExcelAnalyzer-*`
            - El servidor se ejecuta en el puerto 5000 por defecto
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
